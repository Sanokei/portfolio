<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Great+Vibes&family=Pinyon+Script&family=Playfair+Display+SC:wght@900&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    html:not(.loading-font-ready) .loading-title { opacity: 0; }
    #loading-screen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #0d2418;
      z-index: 1000;
    }
    #scroll-prompt {
      position: fixed;
      pointer-events: none;
    }
    #scroll-prompt.scroll-prompt-hidden { opacity: 0; }
  </style>
  <script>
    if (!document.fonts) {
      document.documentElement.classList.add('loading-font-ready');
    } else {
      document.fonts.load('400 64px "Pinyon Script"').then(() => {
        document.documentElement.classList.add('loading-font-ready');
      }).catch(() => {
        document.documentElement.classList.add('loading-font-ready');
      });
    }
  </script>
  <link rel="stylesheet" href="./main.css?v=minimal-loader">
</head>
<body>
  <!-- Loading intro -->
  <div id="loading-screen" role="status" aria-live="polite" aria-label="Loading the museum">
    <div class="loading-panel">
      <div class="loading-title">Loading...</div>
      <div class="loading-bar" aria-hidden="true">
        <div id="loading-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- Cinematic bars arrive after loading fades -->
  <div id="letterbox-bars" aria-hidden="true">
    <div class="letterbox-bar letterbox-bar-top"></div>
    <div class="letterbox-bar letterbox-bar-bottom"></div>
  </div>

  <!-- Scroll prompt appears after wall loads -->
  <div id="scroll-prompt" class="scroll-prompt-hidden">
    <span class="scroll-arrow">&darr;</span>
    <span class="scroll-text">scroll to explore</span>
  </div>

  <!-- Three.js canvas fills viewport -->
  <canvas id="canvas"></canvas>

  <!-- YouTube embeds rendered behind CRT screens -->
  <div id="youtube-layer"></div>

  <!-- Import map: Three.js from CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="./js/main.js?v=museum-signs"></script>
</body>
</html>
